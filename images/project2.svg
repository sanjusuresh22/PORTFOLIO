<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" role="img" aria-labelledby="title desc">
  <title id="title">Weather App preview</title>
  <desc id="desc">A weather dashboard preview with sun, cloud, and forecast tiles.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#sky)"/>
  <circle cx="660" cy="145" r="64" fill="#fde68a"/>
  <circle cx="330" cy="260" r="72" fill="#e0f2fe"/>
  <circle cx="410" cy="230" r="92" fill="#f8fafc"/>
  <circle cx="505" cy="270" r="66" fill="#e0f2fe"/>
  <rect x="290" y="260" width="280" height="86" rx="43" fill="#f8fafc"/>
  <rect x="145" y="410" width="145" height="92" rx="18" fill="#ffffff" opacity=".88"/>
  <rect x="330" y="410" width="145" height="92" rx="18" fill="#ffffff" opacity=".88"/>
  <rect x="515" y="410" width="145" height="92" rx="18" fill="#ffffff" opacity=".88"/>
  <text x="450" y="375" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="58" font-weight="700" fill="#0f172a">24C</text>
  <text x="450" y="456" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="28" font-weight="600" fill="#0f172a">Weather App</text>
</svg>
